name: Enterprise Precision Compliance Audit

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This allows you to manually click a button to run it anytime

jobs:
  precision-check:
    runs-on: ubuntu-latest
    steps:
      # 1. Pulls down the code in the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Runs your exact live marketplace engine
      - name: Run DriftLint Audit
        uses: joeiko3424-svg/driftlint-action@v1.0.0
        with:
          mode: 'finance'
